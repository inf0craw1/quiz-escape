<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#13253a">
  <link rel="icon" href="data:,">
  <title>비밀 수학 연구소 QR 방탈출</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Gowun+Dodum&family=Jua&display=swap');

    :root {
      --ink: #13253a;
      --muted: #5e7187;
      --paper: #fff8e8;
      --cream: #fffdf5;
      --mint: #7bdcb5;
      --sky: #8fd3ff;
      --sun: #ffd166;
      --coral: #ff6b6b;
      --violet: #7157ff;
      --green: #2bb673;
      --danger: #d94c4c;
      --line: rgba(19, 37, 58, 0.16);
      --shadow: rgba(19, 37, 58, 0.22);
      --radius: 28px;
    }

    * { box-sizing: border-box; }

    html { scroll-behavior: smooth; }

    body {
      min-height: 100vh;
      margin: 0;
      color: var(--ink);
      font-family: 'Gowun Dodum', 'Apple SD Gothic Neo', sans-serif;
      background:
        radial-gradient(circle at 12% 12%, rgba(255, 209, 102, 0.55), transparent 20rem),
        radial-gradient(circle at 88% 10%, rgba(113, 87, 255, 0.24), transparent 22rem),
        radial-gradient(circle at 78% 84%, rgba(123, 220, 181, 0.42), transparent 24rem),
        linear-gradient(135deg, #e8f6ff 0%, #fff8e8 58%, #e7fff4 100%);
    }

    body::before {
      position: fixed;
      inset: 0;
      z-index: -1;
      pointer-events: none;
      content: '';
      background-image:
        linear-gradient(rgba(19, 37, 58, 0.055) 1px, transparent 1px),
        linear-gradient(90deg, rgba(19, 37, 58, 0.055) 1px, transparent 1px);
      background-size: 34px 34px;
      mask-image: linear-gradient(to bottom, black, transparent 78%);
    }

    a { color: inherit; }

    button, input {
      font: inherit;
    }

    button {
      min-height: 48px;
      border: 0;
      border-radius: 999px;
      cursor: pointer;
      transition: transform 150ms ease, box-shadow 150ms ease, opacity 150ms ease;
    }

    button:hover { transform: translateY(-2px); }
    button:active { transform: translateY(0); }
    button:disabled { cursor: not-allowed; opacity: 0.55; transform: none; }

    .shell {
      width: min(1120px, calc(100% - 28px));
      margin: 0 auto;
      padding: 22px 0 44px;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      padding: 14px 18px;
      margin-bottom: 18px;
      border: 1px solid rgba(255, 255, 255, 0.7);
      border-radius: 999px;
      background: rgba(255, 253, 245, 0.78);
      box-shadow: 0 18px 46px rgba(19, 37, 58, 0.08);
      backdrop-filter: blur(16px);
    }

    .brand {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      font-family: 'Jua', sans-serif;
      font-size: clamp(18px, 3vw, 24px);
      text-decoration: none;
    }

    .brand-mark {
      display: grid;
      width: 42px;
      height: 42px;
      place-items: center;
      border-radius: 15px;
      color: white;
      background: var(--ink);
      box-shadow: 0 12px 28px rgba(19, 37, 58, 0.22);
    }

    .nav {
      display: flex;
      flex-wrap: wrap;
      justify-content: flex-end;
      gap: 8px;
    }

    .nav a, .small-link {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 38px;
      padding: 8px 13px;
      border-radius: 999px;
      color: var(--ink);
      font-size: 14px;
      font-weight: 700;
      text-decoration: none;
      background: rgba(255, 255, 255, 0.72);
      border: 1px solid var(--line);
    }

    .hero {
      position: relative;
      display: grid;
      grid-template-columns: 1.08fr 0.92fr;
      gap: 22px;
      align-items: stretch;
    }

    .panel, .mission-panel, .card {
      border: 1px solid rgba(255, 255, 255, 0.72);
      border-radius: var(--radius);
      background: rgba(255, 253, 245, 0.86);
      box-shadow: 0 24px 70px rgba(19, 37, 58, 0.12);
      backdrop-filter: blur(18px);
    }

    .panel { padding: clamp(24px, 5vw, 48px); }

    .eyebrow, .badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      width: fit-content;
      padding: 8px 13px;
      border-radius: 999px;
      font-family: 'Jua', sans-serif;
      background: var(--sun);
      box-shadow: inset 0 -3px 0 rgba(19, 37, 58, 0.1);
    }

    .badge.green { background: var(--mint); }
    .badge.sky { background: var(--sky); }
    .badge.coral { background: var(--coral); color: white; }
    .badge.violet { background: var(--violet); color: white; }

    h1, h2, h3, .mission-number {
      font-family: 'Jua', 'Black Han Sans', sans-serif;
      letter-spacing: -0.03em;
    }

    h1 {
      margin: 18px 0 12px;
      font-size: clamp(48px, 9vw, 96px);
      line-height: 0.9;
    }

    h2 {
      margin: 0 0 12px;
      font-size: clamp(30px, 5vw, 52px);
      line-height: 1;
    }

    h3 { margin: 0 0 8px; font-size: 24px; }
    p { line-height: 1.7; }

    .subtitle {
      max-width: 680px;
      margin: 0;
      color: var(--muted);
      font-size: clamp(17px, 2.5vw, 22px);
      font-weight: 700;
    }

    .hero-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 26px;
    }

    .primary-btn, .secondary-btn, .ghost-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 54px;
      padding: 14px 22px;
      border-radius: 999px;
      font-weight: 900;
      text-decoration: none;
    }

    .primary-btn {
      color: white;
      background: var(--ink);
      box-shadow: 0 16px 30px rgba(19, 37, 58, 0.25);
    }

    .secondary-btn {
      color: var(--ink);
      background: var(--sun);
      box-shadow: 0 14px 28px rgba(255, 209, 102, 0.36);
    }

    .ghost-btn {
      color: var(--ink);
      background: rgba(255, 255, 255, 0.78);
      border: 1px solid var(--line);
    }

    .lab-card {
      position: relative;
      min-height: 440px;
      overflow: hidden;
      padding: 28px;
    }

    .lab-card::before {
      position: absolute;
      inset: auto -30px -36px auto;
      width: 240px;
      height: 240px;
      border: 26px solid rgba(113, 87, 255, 0.12);
      border-radius: 50%;
      content: '';
    }

    .orb {
      display: grid;
      width: min(260px, 62vw);
      height: min(260px, 62vw);
      place-items: center;
      margin: 22px auto;
      border-radius: 42% 58% 55% 45%;
      background:
        radial-gradient(circle at 35% 30%, white, rgba(255, 255, 255, 0.25) 28%, transparent 29%),
        linear-gradient(135deg, var(--sky), var(--mint) 54%, var(--sun));
      box-shadow: 0 28px 58px rgba(19, 37, 58, 0.16);
      animation: float 5s ease-in-out infinite;
    }

    .orb span {
      font-family: 'Jua', sans-serif;
      font-size: 86px;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0) rotate(-2deg); }
      50% { transform: translateY(-12px) rotate(2deg); }
    }

    .section-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 14px;
      margin-top: 18px;
    }

    .card { padding: 20px; }

    .mission-list {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 14px;
      margin-top: 18px;
    }

    .mission-tile {
      display: flex;
      min-height: 170px;
      flex-direction: column;
      justify-content: space-between;
      padding: 18px;
      border: 1px solid var(--line);
      border-radius: 24px;
      text-decoration: none;
      background: rgba(255, 255, 255, 0.72);
      transition: transform 160ms ease, box-shadow 160ms ease;
    }

    .mission-tile:hover {
      transform: translateY(-4px) rotate(-0.5deg);
      box-shadow: 0 18px 34px rgba(19, 37, 58, 0.12);
    }

    .mission-panel {
      display: grid;
      grid-template-columns: 310px 1fr;
      min-height: 650px;
      overflow: hidden;
    }

    .mission-side {
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 28px;
      color: white;
      background:
        radial-gradient(circle at 20% 12%, rgba(255,255,255,0.28), transparent 12rem),
        linear-gradient(160deg, var(--ink), #274a6f 55%, #426d8f);
    }

    .mission-number {
      display: grid;
      width: 112px;
      height: 112px;
      place-items: center;
      border-radius: 34px;
      color: var(--ink);
      font-size: 48px;
      background: var(--sun);
      box-shadow: inset 0 -8px 0 rgba(19, 37, 58, 0.12);
    }

    .mission-main { padding: clamp(24px, 5vw, 46px); }

    .question-box {
      margin: 22px 0;
      padding: clamp(20px, 4vw, 32px);
      border: 2px dashed rgba(19, 37, 58, 0.18);
      border-radius: 26px;
      background: rgba(255, 255, 255, 0.72);
      font-size: clamp(22px, 4.2vw, 34px);
      font-weight: 900;
      line-height: 1.55;
    }

    .highlight {
      padding: 0 0.15em;
      border-radius: 0.4em;
      background: linear-gradient(transparent 42%, rgba(255, 209, 102, 0.85) 42%);
    }

    .answer-form {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 10px;
      align-items: center;
      margin-top: 22px;
    }

    .answer-input, .team-input {
      width: 100%;
      min-height: 58px;
      padding: 12px 18px;
      border: 2px solid rgba(19, 37, 58, 0.18);
      border-radius: 20px;
      color: var(--ink);
      font-size: 22px;
      font-weight: 900;
      background: white;
      outline: none;
    }

    .answer-input:focus, .team-input:focus {
      border-color: var(--violet);
      box-shadow: 0 0 0 5px rgba(113, 87, 255, 0.13);
    }

    .feedback {
      display: none;
      margin-top: 18px;
      padding: 18px;
      border-radius: 22px;
      font-weight: 800;
    }

    .feedback.show { display: block; }
    .feedback.correct { background: rgba(123, 220, 181, 0.34); border: 1px solid rgba(43, 182, 115, 0.35); }
    .feedback.wrong { background: rgba(255, 107, 107, 0.16); border: 1px solid rgba(217, 76, 76, 0.25); }

    .hint-stack {
      display: grid;
      gap: 10px;
      margin-top: 20px;
    }

    .hint {
      padding: 14px 16px;
      border: 1px solid var(--line);
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.72);
    }

    .hint summary {
      min-height: 36px;
      cursor: pointer;
      font-weight: 900;
    }

    .roles {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 10px;
      margin-top: 14px;
    }

    .role {
      padding: 12px;
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.7);
      border: 1px solid var(--line);
      font-size: 14px;
      font-weight: 800;
    }

    .record-table, .qr-table {
      width: 100%;
      border-collapse: collapse;
      overflow: hidden;
      border-radius: 18px;
      background: white;
    }

    th, td {
      padding: 12px;
      border-bottom: 1px solid var(--line);
      text-align: left;
      vertical-align: top;
    }

    th { background: rgba(143, 211, 255, 0.25); font-family: 'Jua', sans-serif; }

    .qr-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 14px;
      margin-top: 18px;
    }

    .qr-card {
      padding: 16px;
      border: 1px solid var(--line);
      border-radius: 24px;
      background: rgba(255, 255, 255, 0.75);
    }

    .qr-card img {
      display: block;
      width: min(180px, 100%);
      height: auto;
      margin: 10px auto;
      border: 10px solid white;
      border-radius: 18px;
    }

    .scanner-box {
      min-height: 360px;
      margin-top: 18px;
      padding: 16px;
      border: 2px dashed rgba(19, 37, 58, 0.18);
      border-radius: 26px;
      background: rgba(255, 255, 255, 0.72);
    }

    .scanner-box video {
      border-radius: 20px;
    }

    .scan-status {
      margin-top: 14px;
      padding: 14px 16px;
      border-radius: 18px;
      background: rgba(143, 211, 255, 0.22);
      font-weight: 800;
    }

    .manual-token-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-top: 14px;
    }

    .copy-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 8px;
      align-items: center;
    }

    .url-box {
      overflow: hidden;
      padding: 10px 12px;
      border-radius: 12px;
      text-overflow: ellipsis;
      white-space: nowrap;
      background: rgba(19, 37, 58, 0.06);
      font-size: 12px;
    }

    .final-sum {
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      gap: 10px;
      margin: 18px 0;
    }

    .sum-chip {
      padding: 16px 10px;
      border-radius: 20px;
      text-align: center;
      background: rgba(255, 255, 255, 0.74);
      border: 1px solid var(--line);
      font-weight: 900;
    }

    .hidden {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    .empty-state {
      padding: 36px;
      border-radius: 26px;
      text-align: center;
      background: rgba(255, 255, 255, 0.72);
    }

    @media (max-width: 900px) {
      .hero, .mission-panel { grid-template-columns: 1fr; }
      .section-grid, .mission-list, .qr-grid { grid-template-columns: 1fr 1fr; }
      .roles, .final-sum { grid-template-columns: repeat(2, 1fr); }
      .mission-side { min-height: 260px; }
    }

    @media (max-width: 620px) {
      .shell { width: min(100% - 20px, 1120px); padding-top: 10px; }
      .topbar { align-items: flex-start; border-radius: 24px; flex-direction: column; }
      .nav { justify-content: flex-start; }
      .section-grid, .mission-list, .qr-grid, .answer-form, .copy-row { grid-template-columns: 1fr; }
      .panel, .mission-main, .mission-side { padding: 20px; }
      .question-box { font-size: 22px; }
    }
  </style>
</head>
<body>
  <div class="shell">
    <header class="topbar">
      <a class="brand" href="#/">
        <span class="brand-mark">∑</span>
        <span>비밀 수학 연구소</span>
      </a>
      <nav class="nav" id="mainNav" aria-label="주요 이동">
        <a href="#/subjects">과목 선택</a>
        <a href="#/">입구</a>
      </nav>
    </header>

    <main id="app" aria-live="polite"></main>
  </div>

  <script src="src/vendor/html5-qrcode.min.js"></script>
  <script src="src/data/games.js"></script>
  <script>
    const catalog = window.QUIZ_ESCAPE_CATALOG || { subjects: [] };

    function allGames() {
      return catalog.subjects.flatMap(subject => subject.games.map(game => ({ ...game, subject })));
    }

    function defaultGame() {
      return allGames()[0] || null;
    }

    function findGame(subjectId, gameId) {
      return allGames().find(game => game.subjectId === subjectId && game.id === gameId) || defaultGame();
    }

    function gameFromHash() {
      const match = (location.hash || '').match(/^#\/(?:student|game|play|scan|result|teacher|record|final|print)\/([^/]+)\/([^/]+)/);
      return match ? findGame(match[1], match[2]) : defaultGame();
    }

    let currentGame = gameFromHash();
    let missions = currentGame.missions;
    let roles = currentGame.roles;
    const app = document.querySelector('#app');
    const mainNav = document.querySelector('#mainNav');
    let storageKey = `quiz-escape-state-${currentGame.storageKey || `${currentGame.subjectId}-${currentGame.id}`}`;
    let finalAnswer = missions.reduce((total, mission) => total + mission.answer, 0);
    function createEmptyState() {
      return { teamName: '', memberCount: '4', startedAt: '', activeMissionId: null, lastScannedToken: '', solved: {}, attempts: {} };
    }

    let memoryState = createEmptyState();
    let storageAvailable = true;
    let qrScanner = null;

    function syncActiveGame() {
      currentGame = gameFromHash();
      missions = currentGame.missions;
      roles = currentGame.roles;
      storageKey = `quiz-escape-state-${currentGame.storageKey || `${currentGame.subjectId}-${currentGame.id}`}`;
      finalAnswer = missions.reduce((total, mission) => total + mission.answer, 0);
      renderNav();
    }

    function renderNav() {
      const teacherMode = location.hash.startsWith('#/teacher') || location.hash.startsWith('#/print');
      mainNav.innerHTML = `
        <a href="#/subjects">과목 선택</a>
        ${teacherMode ? `
          <a href="${gamePath('teacher')}">교사용</a>
          <a href="${gamePath('print')}">인쇄용 QR</a>
          <a href="${gamePath('student')}">학생용 확인</a>
        ` : `
          <a href="${gamePath('student')}">학생용</a>
          <a href="${gamePath('scan')}">QR 스캔</a>
          <a href="${gamePath('record')}">팀 기록</a>
        `}
      `;
    }

    function sanitizeState(saved) {
      if (!saved || typeof saved !== 'object') {
        return createEmptyState();
      }

      return {
        teamName: typeof saved.teamName === 'string' ? saved.teamName : '',
        memberCount: typeof saved.memberCount === 'string' ? saved.memberCount : '4',
        startedAt: typeof saved.startedAt === 'string' ? saved.startedAt : '',
        activeMissionId: Number.isInteger(saved.activeMissionId) ? saved.activeMissionId : null,
        lastScannedToken: typeof saved.lastScannedToken === 'string' ? saved.lastScannedToken : '',
        solved: saved.solved && typeof saved.solved === 'object' && !Array.isArray(saved.solved) ? saved.solved : {},
        attempts: saved.attempts && typeof saved.attempts === 'object' && !Array.isArray(saved.attempts) ? saved.attempts : {}
      };
    }

    function getState() {
      if (!storageAvailable) {
        return memoryState;
      }

      try {
        memoryState = sanitizeState(JSON.parse(localStorage.getItem(storageKey)));
      } catch {
        storageAvailable = false;
        memoryState = sanitizeState(memoryState);
      }
      return memoryState;
    }

    function saveState(state) {
      memoryState = sanitizeState(state);
      try {
        localStorage.setItem(storageKey, JSON.stringify(memoryState));
        storageAvailable = true;
      } catch {
        storageAvailable = false;
        // Some school tablet/browser settings block localStorage. The game still works for the current screen.
      }
    }

    function clearState() {
      memoryState = createEmptyState();
      try {
        localStorage.removeItem(storageKey);
        storageAvailable = true;
      } catch {
        storageAvailable = false;
        // Ignore blocked storage during classroom use.
      }
    }

    function solvedCount(state = getState()) {
      return missions.filter(mission => state.solved[mission.id]).length;
    }

    function qrPayload(mission) {
      return mission.token;
    }

    function normalizeToken(value) {
      return String(value || '').trim().toUpperCase();
    }

    function findMissionByToken(value) {
      const token = normalizeToken(value);
      return missions.find(mission => normalizeToken(mission.token) === token);
    }

    function allMissionsSolved(state = getState()) {
      return missions.every(mission => state.solved[mission.id]);
    }

    function gamePath(route) {
      return `#/${route}/${currentGame.subjectId}/${currentGame.id}`;
    }

    function stopScanner() {
      if (!qrScanner) {
        return;
      }

      qrScanner.clear().catch(() => {});
      qrScanner = null;
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#039;');
    }

    function render() {
      syncActiveGame();
      const hash = location.hash || '#/';
      const missionMatch = hash.match(/^#\/mission\/(\d+)$/);
      const gameMatch = hash.match(/^#\/(?:game|student)\/([^/]+)\/([^/]+)$/);
      if (!hash.startsWith('#/scan')) {
        stopScanner();
      }
      if (hash === '#/subjects') {
        renderSubjects();
        return;
      }
      if (hash.startsWith('#/print/')) {
        renderPrintQrList();
        return;
      }
      if (gameMatch) {
        renderHome();
        return;
      }
      if (missionMatch) {
        renderMission(Number(missionMatch[1]));
        return;
      }
      if (hash === '#/scan' || hash.startsWith('#/scan/')) {
        renderScanner();
        return;
      }
      if (hash === '#/active' || hash.startsWith('#/play/')) {
        renderActiveMission();
        return;
      }
      if (hash === '#/record' || hash.startsWith('#/record/')) {
        renderRecord();
        return;
      }
      if (hash === '#/final' || hash.startsWith('#/final/')) {
        renderFinal();
        return;
      }
      if (hash === '#/result' || hash.startsWith('#/result/')) {
        renderResult();
        return;
      }
      if (hash === '#/teacher' || hash.startsWith('#/teacher/')) {
        renderTeacher();
        return;
      }
      renderHome();
    }

    function renderSubjects() {
      app.innerHTML = `
        <section class="panel">
          <span class="badge violet">방탈출 라이브러리</span>
          <h1 style="font-size:clamp(42px,8vw,84px);">과목을 선택하세요</h1>
          <p class="subtitle">과목마다 여러 개의 방탈출을 추가할 수 있습니다. 새 방탈출은 <strong>src/data/games.js</strong>에 데이터만 추가하면 됩니다.</p>
          <div class="mission-list">
            ${catalog.subjects.map(subject => `
              <article class="mission-tile">
                <span class="badge sky">${subject.name}</span>
                <div><h3>${subject.name} 방탈출</h3><p>${subject.description}</p></div>
                <div class="hero-actions">

    function startScanner() {
      const status = document.querySelector('#scannerStatus');
      stopScanner();
      if (!window.Html5QrcodeScanner || !window.Html5QrcodeScanType) {
        status.textContent = 'QR 스캔 라이브러리를 불러오지 못했습니다. 인터넷 연결을 확인하거나 교사용 토큰으로 테스트하세요.';
        return;
      }

      qrScanner = new Html5QrcodeScanner('qr-reader', {
        fps: 10,
        qrbox: { width: 250, height: 250 },
        rememberLastUsedCamera: true,
        supportedScanTypes: [Html5QrcodeScanType.SCAN_TYPE_CAMERA]
      }, false);

      qrScanner.render(decodedText => {
        handleScanResult(decodedText);
      }, () => {});
    }

    function handleScanResult(decodedText) {
      const mission = findMissionByToken(decodedText);
      const state = getState();
      state.lastScannedToken = normalizeToken(decodedText);
      state.startedAt = state.startedAt || new Date().toISOString();

      if (!mission) {
        saveState(state);
        const status = document.querySelector('#scannerStatus');
        if (status) {
          status.textContent = `알 수 없는 연구소 QR입니다: ${state.lastScannedToken}`;
        }
        return;
      }

      state.activeMissionId = mission.id;
      saveState(state);
      stopScanner();
      location.hash = gamePath('play');
    }

      const input = document.querySelector('#answerInput');

      const attemptCount = document.querySelector('#attemptCount');
      const value = Number(input.value.trim());
      const state = getState();

          <p class="subtitle">${currentGame.teacherInstructions || '각 QR을 아래 장소에 붙이고, 학생은 앱에서 받은 위치 힌트를 따라 다음 QR을 찾아갑니다.'}</p>
          <div class="hero-actions">
            <a class="primary-btn" href="${gamePath('student')}">학생용 URL 열기</a>
            <a class="secondary-btn" href="${currentGame.qrListPdf || '#'}">QR 리스트 PDF 다운로드</a>
            <a class="ghost-btn" href="${gamePath('print')}">인쇄용 QR 페이지</a>
          </div>
          <div class="qr-grid">
            ${missions.map(mission => {
              const payload = qrPayload(mission);
              return `
                <article class="qr-card">
                  <span class="badge sky">QR ${mission.id}</span>
                  <h3>${mission.gate}</h3>
                  <p><strong>이 QR 붙일 곳:</strong> ${mission.hiddenPlace}</p>
                  <img alt="QR ${mission.id} 코드" src="${qrApi}${encodeURIComponent(payload)}">
                  <div class="copy-row">
                    <div class="url-box" title="${payload}">${payload}</div>
                    <button class="ghost-btn copy-btn" type="button" data-url="${payload}">토큰 복사</button>
                  </div>
                </article>
              `;
            }).join('')}
          </div>
        </section>
      `;

      document.querySelectorAll('.copy-btn').forEach(button => {
        button.addEventListener('click', async () => {
          try {
            await navigator.clipboard.writeText(button.dataset.url);
            button.textContent = '복사됨';
          } catch {
            button.textContent = '복사 실패';
          }
          setTimeout(() => { button.textContent = '복사'; }, 1200);
        });
      });
    }

    function renderPrintQrList() {
      const qrApi = 'https://api.qrserver.com/v1/create-qr-code/?size=260x260&data=';
      app.innerHTML = `
        <section class="panel">
          <span class="badge violet">인쇄용 QR 리스트</span>
          <h1 style="font-size:clamp(42px,8vw,84px);">${currentGame.title} QR</h1>
          <p class="subtitle">학생용 URL: ${location.origin}${location.pathname}${gamePath('student')}</p>
          <div class="qr-grid">
            ${missions.map(mission => `
              <article class="qr-card">
                <span class="badge sky">QR ${mission.id}</span>
                <h3>${mission.gate}</h3>
                <p><strong>이 QR 붙일 곳:</strong> ${mission.hiddenPlace}</p>
                <img alt="QR ${mission.id} 코드" src="${qrApi}${encodeURIComponent(qrPayload(mission))}">
                <div class="url-box">${mission.token}</div>
              </article>
            `).join('')}
          </div>
        </section>
      `;
    }

    window.addEventListener('hashchange', render);
    render();
  </script>
</body>
</html>
